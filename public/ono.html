<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#160d24" />
  <title>여우별 오노 대결 | NATSUMI Game</title>
  <link rel="preload" href="./fonts/dalmoori.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./game-enhance.css" />
  <link rel="stylesheet" href="./fox-fantasy-pixel.css" />
  <link rel="stylesheet" href="./ono.css" />
</head>
<body class="ono-page">
  <main class="ono-shell">
    <header class="ono-top pixel-frame">
      <a href="/" class="ono-back">← 게임센터</a>
      <div>
        <p class="eyebrow">FOX FANTASY PVP</p>
        <h1>여우별 오노 대결</h1>
        <p>나츠미와 5라운드 카드 승부! 같은 계열 색/룬/여우 마법으로 콤보를 노려봐.</p>
      </div>
      <div class="ono-user" id="onoUser">로그인 확인 중...</div>
    </header>

    <section class="ono-board pixel-frame" aria-live="polite">
      <div class="ono-hud">
        <span id="onoRound">ROUND 1 / 5</span>
        <span id="onoScore">PLAYER 0 : 0 NATSUMI</span>
        <span id="onoMoney">금전 -</span>
      </div>

      <div class="ono-arena">
        <div class="ono-character player">
          <span class="fox-sprite player-fox" aria-hidden="true"><i></i><b></b><em></em></span>
          <strong>PLAYER</strong>
          <small id="playerPower">카드를 골라줘</small>
        </div>

        <div class="ono-center">
          <div class="magic-ring" aria-hidden="true"></div>
          <div class="battle-message" id="battleMessage">베팅금을 넣고 시작하면 카드가 펼쳐져!</div>
          <label class="bet-box">
            <span>BET</span>
            <input id="onoBet" type="number" min="100" step="100" value="1000" inputmode="numeric" />
          </label>
          <button id="startOnoBtn" type="button">오노 대결 시작</button>
        </div>

        <div class="ono-character natsumi">
          <span class="fox-sprite natsumi-fox" aria-hidden="true"><i></i><b></b><em></em></span>
          <strong>NATSUMI</strong>
          <small id="botPower">몰래 마법 충전 중</small>
        </div>
      </div>

      <div class="played-zone">
        <article class="played-card"><small>내 카드</small><div id="playerPlayed" class="ono-card back">?</div></article>
        <article class="played-card"><small>나츠미 카드</small><div id="botPlayed" class="ono-card back">?</div></article>
      </div>

      <div class="hand-title">내 손패</div>
      <div class="ono-hand" id="onoHand"></div>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./ono.js"></script>
</body>
</html>
